<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2DC0AE">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BirdLife Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
:root{ --primary:#2DC0AE; --bg:#EDF8F7; --text:#1A2F5A; }
body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
.card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
h1 { text-align: center; color: var(--primary); }
</style>
</head>
<body>

<h1>BirdLife Tracker 🦅</h1>

<div class="card">
    <h3>Novo Avistamento</h3>
    <input type="text" id="especie" placeholder="Nome da Espécie">
    <input type="text" id="local" placeholder="Localização">
    <input type="text" id="equipamento" placeholder="Equipamento (Câmera/Lente)">
    <input type="file" accept="image/*" capture="environment">
    <button onclick="salvar()">Salvar Registo</button>
</div>

<div id="lista"></div>

<script>
function salvar() {
    const registro = {
        especie: document.getElementById('especie').value,
        local: document.getElementById('local').value,
        data: new Date().toLocaleDateString()
    };
    let lista = JSON.parse(localStorage.getItem('aves') || '[]');
    lista.push(registro);
    localStorage.setItem('aves', JSON.stringify(lista));
    alert("Avistamento guardado!");
    location.reload();
}
</script>
</body>
</html>
